apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword
  namespace: onepassword
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://1password.github.io/connect-helm-charts/
      chart: connect
      version: 1.17.1
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: system-gitops
      interval: 1m
  values:
    operator:
      create: true
    connect:
      credentialsName: op-credentials
      credentialsKey: 1password-credentials.json
