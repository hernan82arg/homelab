---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: system-csi
spec:
  interval: 5m
  chart:
    spec:
      chart: csi-driver-nfs
      version: v4.13.1
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: system-gitops
      interval: 5m
  values:
    image:
    baseRepo: registry.k8s.io
    nfs:
        repository: registry.k8s.io/sig-storage/nfsplugin
        tag: v4.13.1@sha256:c1ab25922c8ec4d7f1744c272f28a89898bd020152e3942592c022410b544948
        pullPolicy: IfNotPresent
    csiProvisioner:
        repository: /sig-storage/csi-provisioner
        tag: v6.1.0@sha256:e5900dc98b0d02f317ea9572f3824983c47a2fb5d5fe2b160aedf1b99c14c9e4
        pullPolicy: IfNotPresent
    csiResizer:
        repository: /sig-storage/csi-resizer
        tag: v2.0.0@sha256:4a95d94e57ad82f6977cd8d4fdcfcfc0b83f02d990e4e7715b688c20970a906d
        pullPolicy: IfNotPresent
    csiSnapshotter:
        repository: /sig-storage/csi-snapshotter
        tag: v8.4.0@sha256:c7e0a3718832b6197ce8b29fefb3fed3d84f4fbcdf08f4606140dbec2566501d
        pullPolicy: IfNotPresent
    livenessProbe:
        repository: /sig-storage/livenessprobe
        tag: v2.17.0@sha256:9b75b9ade162136291d5e8f13a1dfc3dec71ee61419b1bfc112e0796ff8a6aa9
        pullPolicy: IfNotPresent
    nodeDriverRegistrar:
        repository: /sig-storage/csi-node-driver-registrar
        tag: v2.15.0@sha256:11f199f6bec47403b03cb49c79a41f445884b213b382582a60710b8c6fdc316a
        pullPolicy: IfNotPresent
    externalSnapshotter:
        repository: /sig-storage/snapshot-controller
        tag: v8.4.0@sha256:b845f4bbc34d70bd84e92f8021f47704df1de3dbabbd8289969651360b39d605
        pullPolicy: IfNotPresent
    controller:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
