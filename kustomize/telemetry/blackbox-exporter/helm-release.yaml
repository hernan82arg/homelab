apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: system-telemetry
spec:
  interval: 5m
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: '11.8.0'
      sourceRef:
        kind: HelmRepository
        name: blackbox-exporter
        namespace: system-telemetry
  values:
    image:
      registry: quay.io
      repository: prometheus/blackbox-exporter
      tag: v0.28.0
      digest: "sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc"
    configReloader:
      enabled: true
      image:
        registry: quay.io
        repository: prometheus-operator/prometheus-config-reloader
        tag: v0.89.0
        digest: "sha256:cb4ac6a56555bef0e202bec11e367dfe07ffb241cf4d30566b12b864692607a8"
    targets:
      - name: grafana
        url: https://grafana.homelab.local
      - name: web-repo
        url: http://web-repo.homelab.local
