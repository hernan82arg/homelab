kind: Blueprint
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: homelab
  description: This blueprint outlines resources in the homelab context
repository:
  url: https://github.com/hernan82arg/homelab.git
  ref:
    branch: main
  secretName: flux-system
sources:
  - name: core
    url: oci://ghcr.io/windsorcli/core:latest
    install: true
terraform:
  - source: core
    path: cluster/talos
  - source: core
    path: gitops/flux
    destroy: false
  - path: base
    destroy: false
  - path: tapo
    destroy: false
kustomize:
  - name: telemetry-base
    path: telemetry/base
    source: core
    components:
      - prometheus
      - prometheus/flux
      - fluentbit
  - name: telemetry-resources
    path: telemetry/resources
    source: core
    dependsOn:
      - telemetry-base
    components:
      - metrics-server
      - prometheus
      - prometheus/flux
      - fluentbit
      - fluentbit/containerd
      - fluentbit/fluentd
      - fluentbit/kubernetes
      - fluentbit/systemd
  - name: policy-base
    path: policy/base
    source: core
    components:
      - kyverno
  - name: policy-resources
    path: policy/resources
    source: core
    dependsOn:
      - policy-base
  - name: csi
    path: csi
    source: core
    dependsOn:
      - policy-resources
    force: true
    components:
      - openebs
      - openebs/dynamic-localpv
  - name: dns
    path: dns
    source: core
    dependsOn:
      - pki-base
    force: true
    components:
      - coredns
      - coredns/etcd
      - external-dns
      - external-dns/coredns
    patches:
      - patch: |
          apiVersion: helm.toolkit.fluxcd.io/v2beta1
          kind: HelmRelease
          metadata:
            name: coredns
            namespace: system-dns
          spec:
            values:
              nodeSelector:
                node-role.kubernetes.io/control-plane: ""
              tolerations:
                - key: "node-role.kubernetes.io/control-plane"
                  operator: "Exists"
                  effect: "NoSchedule"
        target:
          kind: HelmRelease
          namespace: system-dns
          name: coredns
      - patch: |
          apiVersion: helm.toolkit.fluxcd.io/v2beta1
          kind: HelmRelease
          metadata:
            name: external-dns
            namespace: system-dns
          spec:
            values:
              nodeSelector:
                node-role.kubernetes.io/control-plane: ""
              tolerations:
                - key: "node-role.kubernetes.io/control-plane"
                  operator: "Exists"
                  effect: "NoSchedule"
        target:
          kind: HelmRelease
          namespace: system-dns
          name: external-dns
  - name: gitops
    path: gitops/flux
    source: core
    dependsOn:
      - gateway-resources
    force: true
    substitutions:
      git_repository_name: homelab
    components:
      - webhook
  - name: 1password
    path: base/1password
    dependsOn:
      - pki-base
  - name: nfs-csi
    path: base/nfs-csi
    dependsOn:
      - pki-base
    force: true
  - name: etcd-backup
    path: base/etcd-backup
    dependsOn:
      - pki-base
    force: true
  - name: local-path
    path: base/local-path-csi
    dependsOn:
      - pki-base
  - name: kubevirt
    path: kubevirt
    dependsOn:
      - local-path
  - name: data
    path: data
    dependsOn:
      - csi
    force: true
    components:
      - redis
      - postgres/cloudnativepg
  - name: tapo-api
    path: tapo/api
    dependsOn:
      - pki-base
      - nfs-csi
    force: true
  - name: tapo-web
    path: tapo/web
    dependsOn:
      - pki-base
    force: true
  - name: web-repo
    path: web-repo
    dependsOn:
      - nfs-csi
      - gateway-resources
    force: true
  - name: blackbox-exporter
    path: telemetry/blackbox-exporter
    dependsOn:
      - telemetry-resources
    force: true
  - name: actions-runner-controller
    path: github-actions-runner/controller
    dependsOn:
      - 1password
    force: true
  - name: actions-runners
    path: github-actions-runner/runners
    dependsOn:
      - actions-runner-controller
    force: true
