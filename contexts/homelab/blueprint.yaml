kind: Blueprint
apiVersion: blueprints.windsorcli.dev/v1alpha1
metadata:
  name: homelab
  description: This blueprint outlines resources in the homelab context
repository:
  url: https://github.com/hernan82arg/homelab.git
  ref:
    branch: main
  secretName: flux-system
sources:
  - name: core
    url: oci://ghcr.io/windsorcli/core:latest
    install: true
terraform:
  - source: core
    path: cluster/talos
  - source: core
    path: gitops/flux
    destroy: false
  - path: base
    destroy: false
  - path: tapo
    destroy: false
kustomize:
  - name: gitops
    path: gitops/flux
    source: core
    dependsOn:
      - gateway-resources
    force: true
    substitutions:
      git_repository_name: homelab
    components:
      - webhook
  - name: 1password
    path: base/1password
    dependsOn:
      - pki-base
  - name: nfs-csi
    path: base/nfs-csi
    dependsOn:
      - pki-base
    force: true
  - name: etcd-backup
    path: base/etcd-backup
    dependsOn:
      - pki-base
    force: true
  - name: local-path
    path: base/local-path-csi
    dependsOn:
      - pki-base
  - name: kubevirt
    path: kubevirt
    dependsOn:
      - local-path
  - name: data
    path: data
    dependsOn:
      - csi
    force: true
    components:
      - redis
      - postgres/cloudnativepg
  - name: tapo-api
    path: tapo/api
    dependsOn:
      - pki-base
      - nfs-csi
    force: true
  - name: tapo-web
    path: tapo/web
    dependsOn:
      - pki-base
    force: true
  - name: web-repo
    path: web-repo
    dependsOn:
      - nfs-csi
      - gateway-resources
    force: true
  - name: blackbox-exporter
    path: telemetry/blackbox-exporter
    dependsOn:
      - telemetry-resources
    force: true
  - name: actions-runner-controller
    path: github-actions-runner/controller
    dependsOn:
      - 1password
    force: true
  - name: actions-runners
    path: github-actions-runner/runners
    dependsOn:
      - actions-runner-controller
    force: true
